<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Degen Bunny Easter Spin</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{
      --bg:#07060a;--bg2:#110d16;--panel:rgba(255,255,255,.06);--panel2:rgba(255,255,255,.03);--stroke:rgba(255,255,255,.11);
      --text:#f9f8ff;--muted:#bdb8d1;--purple:#9b5cff;--cyan:#56e4ff;--gold:#ffcf55;--red:#ff667f;--green:#58f0b4;--shadow:0 18px 50px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;background:
      radial-gradient(900px 520px at 50% -10%, rgba(155,92,255,.18), transparent 60%),
      radial-gradient(700px 450px at 92% 10%, rgba(86,228,255,.10), transparent 55%),
      radial-gradient(900px 700px at 10% 100%, rgba(155,92,255,.08), transparent 60%),
      linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;overflow-x:hidden}
    body{padding:14px 14px 100px;display:flex;justify-content:center} button,input,select,textarea{font:inherit}
    .app{width:min(480px,100%);position:relative}
    #splash{position:fixed;inset:0;z-index:999;background:
      radial-gradient(700px 400px at 50% 10%, rgba(155,92,255,.16), transparent 60%),
      linear-gradient(180deg,#08070c,#0b0a10 55%,#09070c);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:opacity .28s ease}
    .stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
    .star{position:absolute;background:#fff;border-radius:50%;box-shadow:0 0 6px rgba(255,255,255,.95),0 0 14px rgba(255,255,255,.65),0 0 24px rgba(155,92,255,.22);animation:twinkle 1.15s infinite ease-in-out;opacity:.34}
    @keyframes twinkle{0%,100%{transform:scale(.7);opacity:.2}50%{transform:scale(1.7);opacity:1}}
    .splashBox{position:relative;z-index:2;text-align:center;width:min(310px,84vw)}
    .logoOrb{width:124px;height:124px;margin:0 auto 18px;border-radius:34px;border:1px solid rgba(255,255,255,.13);background:
      radial-gradient(circle at 30% 25%, rgba(255,255,255,.14), transparent 40%),
      linear-gradient(145deg, rgba(155,92,255,.22), rgba(86,228,255,.10));box-shadow:0 18px 70px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.18);display:grid;place-items:center;overflow:hidden}
    .logoImg{width:100%;height:100%;object-fit:cover}
    .splashTitle{font-weight:900;font-size:23px;letter-spacing:.3px}.splashSub{margin-top:8px;color:var(--muted);font-size:13px}
    .progress{height:14px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.09);overflow:hidden;margin-top:24px}
    .bar{height:100%;width:0;background:linear-gradient(90deg,rgba(80,80,92,.5),#fff);border-radius:999px;box-shadow:0 0 24px rgba(255,255,255,.28);transition:width .16s linear}.loadingText{height:18px;margin-top:14px;color:rgba(255,255,255,.84);font-size:13px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;position:sticky;top:0;padding-top:8px;z-index:20;backdrop-filter:blur(10px)}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}.brandLogo{width:54px;height:54px;border-radius:19px;flex:0 0 auto;display:grid;place-items:center;background:linear-gradient(145deg, rgba(155,92,255,.20), rgba(86,228,255,.09));border:1px solid var(--stroke);box-shadow:var(--shadow);overflow:hidden}
    .brandLogo img{width:100%;height:100%;object-fit:cover}.brandTitle{font-weight:900;font-size:17px;line-height:1.05}.brandSub{margin-top:4px;font-size:12px;color:var(--muted)}
    .topActions{display:flex;gap:8px;align-items:center}.iconBtn,.langBtn{position:relative;border:none;border-radius:16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.95);display:grid;place-items:center;box-shadow:0 14px 38px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.12);cursor:pointer}
    .iconBtn{width:46px;height:46px}.iconBtn.profile{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg, rgba(155,92,255,.26), rgba(86,228,255,.16));box-shadow:0 0 24px rgba(155,92,255,.28),0 12px 42px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.22)}
    .iconBtn svg{width:21px;height:21px}.langBtn{min-width:58px;height:40px;padding:0 12px;font-size:12px;font-weight:900}
    .hero{padding:18px;border-radius:26px;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--stroke);box-shadow:var(--shadow);position:relative;overflow:hidden;margin-bottom:12px}
    .hero::before{content:"";position:absolute;inset:auto -60px -90px auto;width:180px;height:180px;background:radial-gradient(circle, rgba(155,92,255,.24), transparent 65%);filter:blur(10px)}
    .heroTag{display:inline-flex;align-items:center;gap:8px;padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);font-size:11px;font-weight:800;color:#fff}
    .heroTitle{font-size:28px;font-weight:900;line-height:1.02;margin:14px 0 10px}.heroText{font-size:13px;line-height:1.5;color:var(--muted);max-width:350px}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}.metric{padding:12px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}.metricNum{font-size:18px;font-weight:900}.metricLabel{margin-top:4px;color:var(--muted);font-size:11px}
    .tabs{display:flex;gap:8px;padding:8px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid var(--stroke);box-shadow:0 12px 30px rgba(0,0,0,.26);position:sticky;top:76px;z-index:19;margin-bottom:12px;backdrop-filter:blur(10px)}
    .tab{flex:1;padding:12px 8px;border:none;background:transparent;color:rgba(255,255,255,.74);border-radius:15px;font-size:12px;font-weight:900;cursor:pointer}.tab.active{background:linear-gradient(90deg, rgba(155,92,255,.38), rgba(86,228,255,.18));color:#fff;border:1px solid rgba(255,255,255,.10)}.screen{display:none}.screen.active{display:block}
    .card{padding:15px;border-radius:24px;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--stroke);box-shadow:var(--shadow);margin-bottom:12px}.cardTitle{font-size:18px;font-weight:900;margin:0 0 6px}.cardSub{font-size:13px;line-height:1.45;color:var(--muted)}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.btn{border:none;cursor:pointer;border-radius:18px;padding:13px 16px;font-weight:900;font-size:14px;transition:.16s ease}.btn:active{transform:scale(.98)}
    .btn.primary{color:#09070c;background:linear-gradient(90deg,var(--purple),var(--cyan));box-shadow:0 16px 44px rgba(155,92,255,.22)}.btn.secondary{color:#fff;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09)}.btn.ghost{color:#fff;background:transparent;border:1px solid rgba(255,255,255,.10)}.btn.full{width:100%}.btn[disabled]{opacity:.45;cursor:not-allowed}
    .walletBox{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:14px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);margin-top:14px}.walletLabel{font-size:12px;color:var(--muted)}.walletValue{font-size:13px;font-weight:800;word-break:break-all;margin-top:5px}
    #ton-connect{display:flex;justify-content:flex-end;align-items:center;min-height:42px}
    .statusPills{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.pill{padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:11px;font-weight:800}.pill.good{color:#dbfff1;border-color:rgba(88,240,180,.26);background:rgba(88,240,180,.10)}.pill.warn{color:#fff3cc;border-color:rgba(255,207,85,.24);background:rgba(255,207,85,.10)}.pill.bad{color:#ffe5ea;border-color:rgba(255,95,117,.24);background:rgba(255,95,117,.10)}
    .sectionHead{display:flex;align-items:end;justify-content:space-between;gap:12px;margin:2px 0 12px}.sectionTitle{font-size:20px;font-weight:900}.sectionMeta{font-size:12px;color:var(--muted)}
    .bunnyGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.bunny{border-radius:22px;padding:12px;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.09);position:relative;overflow:hidden;cursor:pointer;box-shadow:0 14px 34px rgba(0,0,0,.24)}
    .bunny::before{content:"";position:absolute;inset:auto -40px -65px auto;width:140px;height:140px;background:radial-gradient(circle, rgba(155,92,255,.22), transparent 60%)}.bunny.selected{border-color:rgba(86,228,255,.42);box-shadow:0 0 0 1px rgba(86,228,255,.34), 0 14px 34px rgba(0,0,0,.24)}.bunny.used{opacity:.58;filter:saturate(.72)}
    .bunnyHead{display:flex;justify-content:space-between;gap:10px;align-items:center}.bunnyId{font-size:12px;font-weight:900;letter-spacing:.2px}.badge{padding:6px 9px;border-radius:999px;font-size:10px;font-weight:900;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.06)}.badge.used{background:rgba(255,95,117,.12);border-color:rgba(255,95,117,.24);color:#ffe4eb}.badge.review{background:rgba(255,207,85,.12);border-color:rgba(255,207,85,.24);color:#ffefbe}.badge.available{background:rgba(88,240,180,.10);border-color:rgba(88,240,180,.24);color:#dcfff2}
    .bunnyArt,.selectedArt{width:100%;aspect-ratio:1/1;margin-top:12px;border-radius:20px;background:linear-gradient(145deg, rgba(155,92,255,.18), rgba(86,228,255,.08));border:1px solid rgba(255,255,255,.08);display:grid;place-items:center;overflow:hidden;font-size:48px;box-shadow:inset 0 1px 0 rgba(255,255,255,.10)}
    .bunnyArt img,.selectedArt img,.adminThumb img{width:100%;height:100%;object-fit:cover}.bunnyName{margin-top:12px;font-size:15px;font-weight:900;line-height:1.15}.bunnyMeta{margin-top:6px;font-size:12px;color:var(--muted);line-height:1.35;min-height:32px}
    .selectedBox{display:grid;gap:12px}.selectedMain{display:grid;grid-template-columns:88px 1fr;gap:12px;align-items:center}.selectedArt{width:88px;margin-top:0;border-radius:18px;font-size:36px}.selectedName{font-size:18px;font-weight:900}.selectedSub{margin-top:6px;font-size:12px;color:var(--muted);line-height:1.35}.quoteMeta{margin-top:10px;padding:10px 12px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);font-size:12px;color:#ddd6ff;line-height:1.4}
    .rules{display:grid;gap:10px}.rule{padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);font-size:13px;line-height:1.45;color:#eee}.rule span{font-weight:900;color:#fff}.historyList,.prizeList{display:grid;gap:10px}.history,.prize{padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)}.historyTop,.sheetTop{display:flex;align-items:center;justify-content:space-between;gap:10px}.historyName,.prizeName{font-size:14px;font-weight:900}.historyTime,.prizeMeta{font-size:11px;color:var(--muted);margin-top:3px}.historyPrize{margin-top:8px;font-size:13px;color:#fff}.prize{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}.prizeIcon{width:48px;height:48px;border-radius:16px;background:linear-gradient(145deg, rgba(155,92,255,.20), rgba(86,228,255,.08));display:grid;place-items:center;border:1px solid rgba(255,255,255,.08);font-size:23px}.prizeCount{font-size:11px;font-weight:900;color:#fff;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);display:none;align-items:flex-end;justify-content:center;z-index:110;padding:12px}.overlay.show{display:flex}.sheet{width:min(480px,100%);max-height:90vh;overflow:auto;border-radius:28px 28px 22px 22px;background:linear-gradient(180deg, rgba(15,13,22,.98), rgba(8,7,12,.98));border:1px solid rgba(255,255,255,.10);box-shadow:0 24px 70px rgba(0,0,0,.45);padding:14px}.sheetTitle{font-size:20px;font-weight:900}.closeBtn{width:42px;height:42px;border-radius:14px;border:none;background:rgba(255,255,255,.06);color:#fff;cursor:pointer}
    .spinStage{padding:8px 0 4px}.spinner{display:grid;place-items:center;height:220px;border-radius:24px;background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);position:relative;overflow:hidden}.spinnerGlow{position:absolute;inset:auto 50% -70px auto;width:180px;height:180px;transform:translateX(50%);background:radial-gradient(circle, rgba(155,92,255,.30), transparent 62%)}.spinText{font-size:24px;font-weight:900}.spinSub{margin-top:8px;color:var(--muted);font-size:13px;text-align:center;max-width:260px}
    .resultBox{margin-top:12px;padding:14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);display:none}.resultBox.show{display:block}.resultIcon{width:58px;height:58px;border-radius:18px;background:linear-gradient(145deg, rgba(155,92,255,.24), rgba(86,228,255,.10));display:grid;place-items:center;font-size:26px}.resultTitle{margin-top:10px;font-size:18px;font-weight:900}.resultMeta{margin-top:6px;font-size:13px;color:var(--muted)}
    .toast{position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(20px) scale(.95);padding:16px 24px;border-radius:20px;font-size:15px;font-weight:700;color:#fff;background:linear-gradient(135deg, rgba(155,92,255,.24), rgba(86,228,255,.14));border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(16px);box-shadow:0 12px 42px rgba(0,0,0,.40),inset 0 1px 0 rgba(255,255,255,.18),0 0 25px rgba(155,92,255,.32);opacity:0;pointer-events:none;z-index:200;transition:all .24s ease}.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
    .mini{font-size:11px;color:var(--muted)}.divider{height:1px;background:rgba(255,255,255,.07);margin:14px 0}
    .adminList{display:grid;gap:10px}.adminRow{padding:12px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}.adminTop{display:grid;grid-template-columns:52px 1fr auto;gap:10px;align-items:center}.adminThumb{width:52px;height:52px;border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:linear-gradient(145deg, rgba(155,92,255,.18), rgba(86,228,255,.08));display:grid;place-items:center;font-size:22px}.adminTitle{font-size:14px;font-weight:900}.adminMeta{margin-top:4px;font-size:11px;color:var(--muted);line-height:1.35}.adminControls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.field{width:100%;padding:12px 13px;border-radius:14px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.05);color:#fff;outline:none}.noteField{margin-top:10px}.hidden{display:none !important}
    @media (max-width:390px){.bunnyGrid,.adminControls,.metrics{grid-template-columns:1fr}.heroTitle{font-size:24px}.tabs{top:74px}.selectedMain{grid-template-columns:1fr}.selectedArt{width:100%;height:auto}}
  </style>
</head>
<body>
  <div id="splash"><div class="stars" id="stars"></div><div class="splashBox"><div class="logoOrb"><img class="logoImg" src="bunnylogo.png" alt="Degen Bunny" onerror="this.outerHTML='🐰'" /></div><div class="splashTitle" id="splashTitle"></div><div class="splashSub" id="splashSub"></div><div class="progress"><div class="bar" id="bar"></div></div><div class="loadingText" id="loadingText"></div></div></div>
  <div class="app">
    <div class="top">
      <div class="brand"><div class="brandLogo"><img src="bunnylogo.png" alt="Degen Bunny" onerror="this.outerHTML='🐰'" /></div><div><div class="brandTitle" id="brandTitle"></div><div class="brandSub" id="seasonLabel"></div></div></div>
      <div class="topActions">
        <button class="langBtn" id="langBtn">EN</button>
        <button class="iconBtn hidden" id="adminBtn" aria-label="Admin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2l2.3 4.7 5.2.8-3.8 3.7.9 5.3L12 14l-4.6 2.5.9-5.3L4.5 7.5l5.2-.8L12 2z"/><path d="M12 10v4"/><path d="M10.5 12h3"/></svg></button>
        <button class="iconBtn" id="prizeBtn" aria-label="Prizes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3l2.8 5.6 6.2.9-4.5 4.4 1.1 6.1L12 17l-5.6 3 1.1-6.1L3 9.5l6.2-.9L12 3z"/></svg></button>
        <button class="iconBtn profile" id="profileBtn" aria-label="Profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="8" r="4"/></svg></button>
      </div>
    </div>
    <section class="hero"><div class="heroTag" id="heroTag"></div><div class="heroTitle" id="heroTitle"></div><div class="heroText" id="heroText"></div><div class="metrics"><div class="metric"><div class="metricNum" id="metricOwned">0</div><div class="metricLabel" id="metricOwnedLabel"></div></div><div class="metric"><div class="metricNum" id="metricSpins">0 / 3</div><div class="metricLabel" id="metricSpinsLabel"></div></div><div class="metric"><div class="metricNum" id="metricRare">6</div><div class="metricLabel" id="metricRareLabel"></div></div></div></section>
    <nav class="tabs"><button class="tab active" data-screen="home" id="tabHome"></button><button class="tab" data-screen="inventory" id="tabInventory"></button><button class="tab" data-screen="rules" id="tabRules"></button></nav>
    <section class="screen active" id="home">
      <div class="card">
        <h2 class="cardTitle" id="walletAccessTitle"></h2>
        <div class="cardSub" id="walletAccessSub"></div>
        <div class="walletBox"><div><div class="walletLabel" id="walletStatusLabel"></div><div class="walletValue" id="walletValue"></div></div><div id="ton-connect"></div></div>
        <div class="statusPills"><div class="pill" id="ownedPill"></div><div class="pill warn" id="limitPill"></div><div class="pill" id="selectedPill"></div><div class="pill hidden" id="adminPill"></div></div>
        <div class="row"><button class="btn secondary" id="refreshInventoryBtn"></button><button class="btn ghost" id="goInventoryBtn"></button></div>
      </div>
      <div class="card"><div class="sectionHead"><div><div class="sectionTitle" id="selectedBunnyTitle"></div><div class="sectionMeta" id="selectedBunnyMeta"></div></div></div><div class="selectedBox" id="selectedBox"><div class="selectedMain"><div class="selectedArt" id="selectedArt">?</div><div><div class="selectedName" id="selectedName"></div><div class="selectedSub" id="selectedSub"></div><div class="quoteMeta hidden" id="selectedQuote"></div></div></div><button class="btn primary" id="spinBtn" disabled></button></div></div>
      <div class="card"><div class="sectionHead"><div><div class="sectionTitle" id="poolTitle"></div><div class="sectionMeta" id="poolMeta"></div></div><button class="btn ghost" id="openPrizesBtn"></button></div><div class="prizeList" id="rarePreview"></div></div>
    </section>
    <section class="screen" id="inventory"><div class="card"><div class="sectionHead"><div><div class="sectionTitle" id="inventoryTitle"></div><div class="sectionMeta" id="inventorySub"></div></div><div class="mini" id="inventoryMeta">0</div></div><div class="bunnyGrid" id="bunnyGrid"></div></div></section>
    <section class="screen" id="rules"><div class="card"><div class="sectionTitle" id="rulesTitle"></div><div class="rules"><div class="rule" id="rule1"></div><div class="rule" id="rule2"></div><div class="rule" id="rule3"></div><div class="rule" id="rule4"></div></div><div class="divider"></div><div class="row"><button class="btn secondary hidden" id="resetBtn"></button></div></div><div class="card"><div class="sectionTitle" id="historyTitle"></div><div class="historyList" id="historyList"></div></div></section>
  </div>
  <div class="overlay" id="spinOverlay"><div class="sheet"><div class="sheetTop"><div class="sheetTitle" id="spinSheetTitle"></div><button class="closeBtn" data-close="spinOverlay">✕</button></div><div class="spinStage"><div class="mini" id="spinSelectedLabel"></div><div class="spinner"><div class="spinnerGlow"></div><div><div class="spinText" id="spinText"></div><div class="spinSub" id="spinSub"></div></div></div><div class="row" style="justify-content:center"><button class="btn primary full" id="startSpinBtn"></button></div><div class="resultBox" id="resultBox"><div class="resultIcon" id="resultIcon">🎁</div><div class="resultTitle" id="resultTitle"></div><div class="resultMeta" id="resultMeta"></div></div></div></div></div>
  <div class="overlay" id="prizeOverlay"><div class="sheet"><div class="sheetTop"><div class="sheetTitle" id="prizeSheetTitle"></div><button class="closeBtn" data-close="prizeOverlay">✕</button></div><div class="prizeList" id="prizeList"></div></div></div>
  <div class="overlay" id="profileOverlay"><div class="sheet"><div class="sheetTop"><div class="sheetTitle" id="profileTitle"></div><button class="closeBtn" data-close="profileOverlay">✕</button></div><div class="card" style="margin:0"><div class="walletLabel" id="profileWalletLabel"></div><div class="walletValue" id="profileWallet"></div><div class="statusPills"><div class="pill" id="profileOwned"></div><div class="pill warn" id="profileSpins"></div><div class="pill good" id="profileSeason"></div></div></div><div class="card" style="margin-top:12px;margin-bottom:0"><div class="sectionTitle" id="profileHistoryTitle"></div><div class="historyList" id="profileHistory"></div></div></div></div>
  <div class="overlay" id="adminOverlay"><div class="sheet"><div class="sheetTop"><div class="sheetTitle" id="adminTitle"></div><button class="closeBtn" data-close="adminOverlay">✕</button></div><div class="card" style="margin:0 0 12px"><div class="cardTitle" id="adminCardTitle"></div><div class="cardSub" id="adminCardSub"></div></div><div class="adminList" id="adminList"></div></div></div>
  <div class="toast" id="toast"></div>

  <script type="module">
    import { TonConnectUI } from 'https://esm.sh/@tonconnect/ui@2.0.9';
    import { Address } from 'https://esm.sh/@ton/core@0.57.0';

    const tg = window.Telegram && window.Telegram.WebApp;

    function createSplashStars(){
      const wrap = document.getElementById('stars');
      wrap.innerHTML = '';
      const stars = [];
      function egg(cx, cy, rx, ry, count){
        for(let i=0;i<count;i++){
          const t = (Math.PI * 2 * i) / count;
          const x = cx + rx * Math.sin(t) * (1 + 0.12 * Math.cos(t));
          const y = cy + ry * (-Math.cos(t) + 0.18 * Math.sin(2*t));
          stars.push([x + (Math.random()*1.2-0.6), y + (Math.random()*1.2-0.6)]);
        }
      }
      function kulich(cx, cy, w, h){
        const pts = [];
        for(let i=0;i<18;i++) pts.push([cx - w/2 + (w*i/17), cy - h/2 + Math.sin(i/17*Math.PI)*3]);
        for(let i=0;i<12;i++) pts.push([cx - w/2 + (w*i/11), cy + h/2]);
        for(let i=0;i<8;i++) pts.push([cx - w/2, cy - h/2 + (h*i/7)]);
        for(let i=0;i<8;i++) pts.push([cx + w/2, cy - h/2 + (h*i/7)]);
        pts.forEach(([x,y]) => stars.push([x + (Math.random()*1.4-0.7), y + (Math.random()*1.4-0.7)]));
      }
      egg(18, 35, 8, 12, 34);
      egg(82, 32, 10, 14, 40);
      egg(72, 72, 8, 12, 34);
      kulich(34, 72, 18, 24);
      for(let i=0;i<120;i++) stars.push([Math.random()*100, Math.random()*100]);
      stars.forEach(([x,y]) => {
        const s = document.createElement('div');
        s.className='star';
        const size = 1 + Math.random()*1.9;
        s.style.width = size + 'px'; s.style.height = size + 'px';
        s.style.left = x + '%'; s.style.top = y + '%';
        s.style.animationDelay = (Math.random()*1.4) + 's';
        s.style.animationDuration = (0.9 + Math.random()*0.7) + 's';
        wrap.appendChild(s);
      });
    }

    async function fetchOwnedBunnies(ownerAddress){
      const url = new URL('https://toncenter.com/api/v3/nft/items');
      url.searchParams.set('owner_address', ownerAddress);
      url.searchParams.set('collection_address', COLLECTION_ADDRESS);
      url.searchParams.set('include_on_sale', 'true');
      url.searchParams.set('limit', '100'); url.searchParams.set('offset', '0');
      const res = await fetch(url.toString(), { headers:{ 'accept':'application/json' } });
      if(!res.ok) throw new Error('NFT fetch failed');
      const data = await res.json();
      const items = Array.isArray(data.nft_items) ? data.nft_items : [];
      return items.sort((a,b)=>Number(a.index)-Number(b.index)).map(item => mapItem(item, ownerAddress));
    }

    async function fetchCollectionBunnies(){
      const url = new URL('https://toncenter.com/api/v3/nft/items');
      url.searchParams.set('collection_address', COLLECTION_ADDRESS);
      url.searchParams.set('include_on_sale', 'true');
      url.searchParams.set('limit', '100'); url.searchParams.set('offset', '0');
      const res = await fetch(url.toString(), { headers:{ 'accept':'application/json' } });
      if(!res.ok) throw new Error('Collection fetch failed');
      const data = await res.json();
      const items = Array.isArray(data.nft_items) ? data.nft_items : [];
      return items.sort((a,b)=>Number(a.index)-Number(b.index)).map(item => mapItem(item, item.owner_address || ''));
    }

    function mapItem(item, ownerAddress){
      const md = item.metadata || item.content || {};
      const desc = md.description || '';
      const metaHint = /every year|annual|easter raffle/i.test(desc) ? desc : '';
      return {
        id: item.address,
        index: String(item.index ?? ''),
        name: md.name || `Degen Bunny #${item.index}`,
        trait: desc || 'Degen Bunny holder NFT',
        metaHint,
        image: resolveAssetUrl(md.image || md.image_url || md.preview || ''),
        owner: item.owner_address || ownerAddress,
        collectionAddress: item.collection_address || COLLECTION_ADDRESS
      };
    }

      state.prizes.filter(p => p.rarity !== 'common').forEach(prize => {
        const node = document.createElement('div'); node.className='prize';
        node.innerHTML = `<div class="prizeIcon">${prize.icon}</div><div><div class="prizeName">—</div><div class="prizeMeta">${rarityLabel(prize.rarity)}</div></div><div class="prizeCount">${prize.count === 999 ? ui().infinite : prize.count}</div>`;
        preview.appendChild(node);
      });
      setText('metricRare', String(getRareLeft()));
    }

    function renderHistory(){
      const targets = [document.getElementById('historyList'), document.getElementById('profileHistory')];
      targets.forEach(target => {
        target.innerHTML='';
        if(!state.history.length){ target.innerHTML = `<div class="cardSub">${ui().noHistory}</div>`; return; }
        [...state.history].reverse().forEach(item => {
          const node = document.createElement('div'); node.className='history';
          node.innerHTML = `<div class="historyTop"><div class="historyName">${escapeHtml(item.bunnyName)}</div><div class="historyTime">${formatTime(item.time)}</div></div><div class="historyPrize">${ui().won}: ${escapeHtml(item.prizeLabel)}</div>`;
          target.appendChild(node);
        });
      });
    }

    function renderAdmin(){
      const adminList = document.getElementById('adminList'); adminList.innerHTML = '';
      const source = state.collectionBunnies.length ? state.collectionBunnies : Array.from({length:55}, (_,i)=>({ index:String(i), name:`Degen Bunny #${i}`, image:'', trait:'' }));
      source.forEach(bunny => {
        const reg = getRegistry(bunny.index); const usage = state.history.filter(h => String(h.bunnyIndex) === String(bunny.index)); const last = usage[usage.length - 1];
        const row = document.createElement('div'); row.className='adminRow';
        row.innerHTML = `
          <div class="adminTop">
            <div class="adminThumb">${bunny.image ? `<img src="${bunny.image}" alt="${escapeHtml(bunny.name)}">` : '🐰'}</div>
            <div><div class="adminTitle">${escapeHtml(bunny.name || ('Degen Bunny #' + bunny.index))}</div><div class="adminMeta">${ui().adminMeta(ui()['status' + reg.status.charAt(0).toUpperCase() + reg.status.slice(1)] || reg.status, reg.spunPrize || reg.prize || (last && last.prizeLabel) || '', reg.spunAt ? formatTime(reg.spunAt) : (last ? formatTime(last.time) : ''))}</div></div>
            <div class="badge ${reg.status === 'used' ? 'used' : reg.status === 'review' ? 'review' : 'available'}">${ui().statusMap[reg.status]}</div>
          </div>
          <div class="adminControls">
            <select class="field" data-status="${escapeHtml(String(bunny.index))}">
              <option value="available" ${reg.status === 'available' ? 'selected' : ''}>${ui().statusAvailable}</option>
              <option value="review" ${reg.status === 'review' ? 'selected' : ''}>${ui().statusReview}</option>
              <option value="used" ${reg.status === 'used' ? 'selected' : ''}>${ui().statusUsed}</option>
            </select>
            <input class="field" data-prize="${escapeHtml(String(bunny.index))}" value="${escapeAttr(reg.prize || '')}" placeholder="${ui().adminPrizePlaceholder}" />
          </div>
          <textarea class="field noteField" rows="2" data-note="${escapeHtml(String(bunny.index))}" placeholder="${ui().adminNotePlaceholder}">${escapeHtml(reg.note || '')}</textarea>`;
        adminList.appendChild(row);
      });
      adminList.querySelectorAll('[data-status]').forEach(el => el.addEventListener('change', e => { setRegistry(e.target.dataset.status, { status: e.target.value }); updateUI(); }));
      adminList.querySelectorAll('[data-prize]').forEach(el => el.addEventListener('change', e => { setRegistry(e.target.dataset.prize, { prize: e.target.value }); updateUI(); }));
      adminList.querySelectorAll('[data-note]').forEach(el => el.addEventListener('change', e => { setRegistry(e.target.dataset.note, { note: e.target.value }); updateUI(); }));
    }

    function updateAccessUI(){
      setText('walletValue', state.connected ? state.wallet : ui().notConnected); setText('profileWallet', state.connected ? state.wallet : ui().notConnected);
      setText('ownedPill', ui().ownedPill(state.ownedBunnies.length)); setText('profileOwned', ui().ownedPill(state.ownedBunnies.length));
      setText('metricOwned', String(state.ownedBunnies.length)); setText('metricSpins', `${state.walletSpinsUsed} / 3`); setText('profileSpins', ui().spinsProfile(state.walletSpinsUsed)); setText('profileSeason', ui().profileSeason);
      const selected = getSelectedBunny(); setText('selectedPill', ui().selectedPill(selected ? '#' + selected.index : '—')); setText('limitPill', ui().limitPill);
      document.getElementById('adminBtn').classList.toggle('hidden', !state.isAdmin); document.getElementById('resetBtn').classList.toggle('hidden', !state.isAdmin); document.getElementById('adminPill').classList.toggle('hidden', !state.isAdmin);
      if(state.isAdmin){ document.getElementById('adminPill').classList.add('good'); setText('adminPill', ui().adminAccess); }
    }

    function updateUI(){ updateAccessUI(); renderInventory(); updateSelectedBox(); renderPrizes(); renderHistory(); if(state.isAdmin) renderAdmin(); saveState(); }

    function choosePrize(){
      const available = state.prizes.filter(p => p.count > 0 || p.count === 999); const total = available.reduce((sum,p)=>sum+p.weight,0); let roll = Math.random()*total;
      for(const prize of available){ roll -= prize.weight; if(roll <= 0){ if(prize.count !== 999) prize.count -= 1; return prize; } }
      return available[available.length - 1];
    }

    async function handleWalletConnected(accountAddress){
      const normalized = normalizeAddress(accountAddress);
      state.connected = true; state.wallet = normalized?.bounceable || accountAddress; state.walletRaw = normalized?.raw || accountAddress; state.isAdmin = isAdminWallet(accountAddress);
      if(state.isAdmin) showToast(ui().adminDetected);
      await refreshInventory(); if(state.isAdmin) refreshCollection(); updateUI();
    }

    function resetSeason(){
      const lang = state.language; state = createDefaultState(); state.language = lang; saveState();
      if(tonConnectUI?.wallet?.account?.address){ handleWalletConnected(tonConnectUI.wallet.account.address); } else { updateUI(); }
      showToast(ui().resetDone);
    }

    function openOverlay(id){ document.getElementById(id).classList.add('show'); }
    function closeOverlay(id){ document.getElementById(id).classList.remove('show'); }

    function startSpinFlow(){
      const bunny = getSelectedBunny(); if(!bunny){ showToast(ui().selectFirst); return; }
      const reg = getRegistry(bunny.index); if(reg.status === 'used'){ showToast(ui().alreadyUsed); return; } if(state.walletSpinsUsed >= 3){ showToast(ui().walletLimitReached); return; }
      setText('spinSelectedLabel', ui().spinSelectedLabel(`${bunny.name} · #${bunny.index}`)); setText('spinText', ui().spinReady); setText('spinSub', ui().spinReadySub); document.getElementById('resultBox').classList.remove('show'); openOverlay('spinOverlay');
    }

    function runSpin(){
      if(spinning) return; const bunny = getSelectedBunny(); if(!bunny) return;
      spinning = true; const spinText = document.getElementById('spinText'); const spinSub = document.getElementById('spinSub'); const resultBox = document.getElementById('resultBox'); resultBox.classList.remove('show');
      const words = ui().spinWords; let i = 0;
      spinTimer = setInterval(()=>{ spinText.textContent = words[i % words.length] + '...'; spinSub.textContent = ui().spinChamber(bunny.index); i++; }, 220);
      setTimeout(()=>{
        clearInterval(spinTimer);
        const prize = choosePrize(); const prizeLabel = getPrizeLabel(prize);
        state.walletSpinsUsed += 1; state.bunnyUsage[bunny.id] = { seasonId:SEASON_ID, prizeId:prize.id, time:new Date().toISOString() };
        setRegistry(bunny.index, { spunPrize: prizeLabel, spunAt: new Date().toISOString() });
        state.history.push({ bunnyId:bunny.id, bunnyName:bunny.name, bunnyIndex:bunny.index, prizeId:prize.id, prizeLabel, time:new Date().toISOString() });
        document.getElementById('resultIcon').textContent = prize.icon; setText('resultTitle', prizeLabel); setText('resultMeta', ui().resultSaved); resultBox.classList.add('show'); setText('spinText', ui().resultLocked); setText('spinSub', ui().resultSaved);
        spinning = false; updateUI(); showToast(ui().rewardWon(prizeLabel));
      }, 1900);
    }

    function setActiveTab(screenId){ document.querySelectorAll('.tab').forEach(tab => tab.classList.toggle('active', tab.dataset.screen === screenId)); document.querySelectorAll('.screen').forEach(screen => screen.classList.toggle('active', screen.id === screenId)); }

    async function setupTonConnect(){
      tonConnectUI = new TonConnectUI({ manifestUrl: MANIFEST_URL, buttonRootId: 'ton-connect' });
      tonConnectUI.onStatusChange(async wallet => {
        if(wallet?.account?.address){ await handleWalletConnected(wallet.account.address); }
        else { state.connected=false; state.wallet=null; state.walletRaw=null; state.isAdmin=false; state.ownedBunnies=[]; state.selectedBunnyId=null; saveState(); updateUI(); }
      });
      if(tonConnectUI.wallet?.account?.address){ await handleWalletConnected(tonConnectUI.wallet.account.address); }
    }

    function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function escapeAttr(s){ return escapeHtml(s); }

    document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', ()=> setActiveTab(tab.dataset.screen)));
    document.querySelectorAll('[data-close]').forEach(btn => btn.addEventListener('click', ()=> closeOverlay(btn.dataset.close)));
    document.getElementById('prizeBtn').addEventListener('click', ()=> openOverlay('prizeOverlay'));
    document.getElementById('openPrizesBtn').addEventListener('click', ()=> openOverlay('prizeOverlay'));
    document.getElementById('profileBtn').addEventListener('click', ()=> openOverlay('profileOverlay'));
    document.getElementById('adminBtn').addEventListener('click', ()=> openOverlay('adminOverlay'));
    document.getElementById('goInventoryBtn').addEventListener('click', ()=> setActiveTab('inventory'));
    document.getElementById('refreshInventoryBtn').addEventListener('click', refreshInventory);
    document.getElementById('spinBtn').addEventListener('click', startSpinFlow);
    document.getElementById('startSpinBtn').addEventListener('click', runSpin);
    document.getElementById('resetBtn').addEventListener('click', resetSeason);
    document.getElementById('langBtn').addEventListener('click', ()=>{ state.language = state.language === 'ru' ? 'en' : 'ru'; saveState(); applyLanguage(); });
    document.querySelectorAll('.overlay').forEach(ov => ov.addEventListener('click', (e)=> { if(e.target === ov) ov.classList.remove('show'); }));

    createSplashStars(); applyLanguage(); runSplash(); updateUI(); setupTonConnect().catch(err => { console.error(err); showToast('TON Connect init failed'); });
  </script>
</body>
</html>
